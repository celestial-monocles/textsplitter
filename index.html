<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Text Splitter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      margin: 0;
      padding: 20px;
      background-color: #2a2a2a;
      color: #90BFE0;
    }

    h1, h2 {
      text-align: center;
      color: #90BFE0;
    }

    input, textarea, select {
      font-size: 16px;
      touch-action: manipulation;
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
      resize: vertical;
      font-family: monospace;
    }

    button {
      background-color: #1f1f1f;
      color: #46D1E0;
      border: 1px solid #46D1E0;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    button:hover {
      background-color: #46D1E0;
      color: #1f1f1f;
    }

    #clearSplitButton {
      color: white;
      background-color: #A84A46;
      border: none;
    }

    #clearSplitButton:hover {
      background-color: #8B3A36;
    }

    .section {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: #1f1f1f;
      border-radius: 10px;
    }

    .textarea-container {
      position: relative;
    }
    
    .paste-button {
      position: absolute;
      right: 10px;
      top: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      z-index: 10;
    }

    #charCount {
      text-align: center;
      color: #90BFE0;
      margin: 10px 0;
    }

    #numSplitContainer {
      text-align: center;
      margin: 15px 0;
      color: #90BFE0;
    }

    #numSplitContainer input {
      width: 80px;
      margin-top: 5px;
      text-align: center;
    }

    #lineGapContainer {
      text-align: center;
      margin-top: 10px;
      color: #90BFE0;
    }

    #lineGapContainer div {
      margin-bottom: 5px;
    }

    #lineGap {
      width: auto;
      margin: 0 auto;
      transform: scale(1.3);
    }

    #splitButtonsContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    #splitButtonsContainer button {
      display: inline-block;
      margin: 0;
      padding: 10px 20px;
      min-width: 120px;
      cursor: pointer;
      font-weight: bold;
    }

    .output-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-bottom: 20px;
    }

    .output-box {
      width: 100%;
      background-color: #B8C3E0;
      color: #000;
      resize: vertical;
      margin-bottom: 10px;
    }

    .copy-button {
      font-weight: bold;
      cursor: pointer;
    }

    textarea::placeholder {
      color: #90BFE0;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .paste-button {
        padding: 8px 12px;
        font-size: 16px;
      }
      
      #splitButtonsContainer {
        flex-direction: column;
      }
      
      #splitButtonsContainer button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="section" id="textSplitterApp">
    <h1>Text Splitter</h1>
    
    <div class="textarea-container">
      <textarea id="splitInput" rows="10" placeholder="Paste your text here..." oninput="updateCharCount()"></textarea>
      <button class="paste-button" onclick="handlePaste('splitInput')">Paste</button>
    </div>
    
    <div id="charCount">Character Count: 0</div>

    <div id="numSplitContainer">
      <label for="splitNumber">Number of Splits:</label><br>
      <input id="splitNumber" type="number" min="1" placeholder="2" />
    </div>

    <div id="lineGapContainer">
      <div>Line Gaps</div>
      <input id="lineGap" type="checkbox">
    </div>

    <div id="splitButtonsContainer">
      <button id="splitTextButton" onclick="splitText()">Split Text</button>
      <button id="clearSplitButton" onclick="clearSplitInput()" style="display: none;">Clear Input</button>
    </div>

    <h2>Split Text Outputs</h2>
    <div id="outputContainer"></div>
  </div>

  <script>
    // Paste handler
    async function handlePaste(textareaId) {
      const textarea = document.getElementById(textareaId);
      textarea.focus();
      
      try {
        if (navigator.clipboard && navigator.clipboard.readText) {
          try {
            const text = await navigator.clipboard.readText();
            textarea.value = text;
            updateUIAfterPaste(textareaId);
            return;
          } catch (err) {
            console.error("Clipboard access denied:", err);
          }
        }
        
        if (document.execCommand('paste')) {
          updateUIAfterPaste(textareaId);
          return;
        }
        
        textarea.placeholder = "Please paste manually (Ctrl+V)";
        alert("Please use keyboard paste (Ctrl+V/Cmd+V) or check browser permissions.");
      } catch (err) {
        console.error("Paste failed:", err);
        textarea.placeholder = "Paste failed - try manual paste";
      }
    }

    function updateUIAfterPaste(textareaId) {
      if (textareaId === 'splitInput') {
        updateCharCount();
        document.getElementById('clearSplitButton').style.display = "inline-block";
      }
    }

    // Text Splitter Functions
    function updateCharCount() {
      const text = document.getElementById("splitInput").value;
      document.getElementById("charCount").textContent = `Character Count: ${text.length}`;
      document.getElementById("clearSplitButton").style.display = text.length > 0 ? "inline-block" : "none";
    }

    function clearSplitInput() {
      document.getElementById("splitInput").value = "";
      updateCharCount();
      document.getElementById("outputContainer").innerHTML = "";
    }

    function splitText() {
      const text = document.getElementById("splitInput").value.trim().replace(/\r\n|\r|\n/g, "\n");
      let numSplits = parseInt(document.getElementById("splitNumber").value);
      const lineGap = document.getElementById("lineGap").checked;
      
      if (!numSplits || numSplits < 1) numSplits = 2;

      const lines = text.split("\n");
      const chunkSize = Math.ceil(lines.length / numSplits);
      const outputContainer = document.getElementById("outputContainer");
      outputContainer.innerHTML = "";

      let start = 0;
      for (let i = 0; i < numSplits; i++) {
        const chunk = lines.slice(start, start + chunkSize).join(lineGap ? "\n\n" : "\n");
        start += chunkSize;

        const container = document.createElement("div");
        container.className = "output-container";

        const textBox = document.createElement("textarea");
        textBox.className = "output-box";
        textBox.rows = 10;
        textBox.readOnly = true;
        textBox.value = chunk;

        const countDiv = document.createElement("div");
        countDiv.textContent = `Character Count: ${chunk.length}`;
        countDiv.style.color = "#90BFE0";

        const button = document.createElement("button");
        button.className = "copy-button";
        button.textContent = "Copy Text";
        button.onclick = () => {
          navigator.clipboard.writeText(chunk).then(() => {
            button.textContent = "Copied!";
            setTimeout(() => { button.textContent = "Copy Text"; }, 2000);
          });
        };

        container.appendChild(textBox);
        container.appendChild(countDiv);
        container.appendChild(button);
        outputContainer.appendChild(container);
      }
    }

    // Initialize on load
    window.addEventListener('DOMContentLoaded', () => {
      updateCharCount();
    });
  </script>
</body>
</html>
